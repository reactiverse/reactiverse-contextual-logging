name: Release
on:
  workflow_dispatch:
    inputs:
      release_version:
        description: 'Release version (e.g. 2.0.1)'
        required: true
      next_version:
        description: 'Next development version (e.g. 2.0.2-SNAPSHOT)'
        required: true

permissions:
  contents: write
  pages: write

jobs:
  Prepare:
    name: Prepare release commit
    runs-on: ubuntu-latest
    outputs:
      release_sha: ${{ steps.commit.outputs.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install JDK
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: 11

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Set release version
        run: mvn versions:set -DnewVersion=${{ inputs.release_version }} -DgenerateBackupPoms=false -B

      - name: Commit and push release version
        id: commit
        run: |
          git add -A
          git commit -m "Release version ${{ inputs.release_version }}"
          git push origin main
          echo "sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT

  Test:
    needs: Prepare
    uses: ./.github/workflows/test.yml
    with:
      ref: ${{ needs.Prepare.outputs.release_sha }}

  Release:
    name: Release ${{ inputs.release_version }}
    needs: [ Prepare, Test ]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.Prepare.outputs.release_sha }}

      - name: Install JDK
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: 11
          server-id: central
          server-username: SONATYPE_NEXUS_USERNAME
          server-password: SONATYPE_NEXUS_PASSWORD
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: MAVEN_GPG_PASSPHRASE

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Tag release
        run: git tag release/${{ inputs.release_version }}

      - name: Deploy to Maven Central
        run: mvn -Prelease deploy -DskipTests -DskipITs -Ddoc.outputDirectory=${PWD}/public -B
        env:
          SONATYPE_NEXUS_USERNAME: ${{ secrets.SONATYPE_NEXUS_USERNAME }}
          SONATYPE_NEXUS_PASSWORD: ${{ secrets.SONATYPE_NEXUS_PASSWORD }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.GPG_PRIVATE_KEY_PASSPHRASE }}

      - name: GitHub Pages Deploy
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public

      - name: Create GitHub Release
        run: |
          gh release create release/${{ inputs.release_version }} \
            --title "Release ${{ inputs.release_version }}" \
            --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set next development version
        run: mvn versions:set -DnewVersion=${{ inputs.next_version }} -DgenerateBackupPoms=false -B

      - name: Commit next development version
        run: |
          git add -A
          git commit -m "Development version ${{ inputs.next_version }}"

      - name: Push tag and next development version
        run: git push origin main --follow-tags
